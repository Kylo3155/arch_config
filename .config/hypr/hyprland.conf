source=~/.config/hypr/binds.conf
source=~/.config/hypr/looks.conf
source=~/.config/hypr/input.conf
source=~/.config/hypr/programs.conf
source = ~/.cache/wal/colors-hyprland.conf  

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=DP-1,preferred,0x0,auto
monitor=HDMI-A-1, preferred, 1600x0, auto

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar & swww-daemon
exec-once = pywal-spicetify Dribbblish & vesktop
exec-once = /home/kylo/.local/bin/random-wallpaper

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*
    

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = float-network-editor

    match:class = ^(nm-connection-editor)$
    float = yes
}

windowrule = match:class com.gabm.satty , float yes

windowrule {
    name = float-audio-control

    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
    float = yes
}

windowrule {
    name = float-bluetooth-control

    match:class = ^(io.github.kaii_lb.Overskride)$
    float = yes
}

windowrule = match:class ^(Spotify)$, workspace 9 silent
windowrule = match:class ^(vesktop)$, workspace 10 silent

# Centro de Control
layerrule {
    name = blur
    match:class = ^(swaync-control-center)$
    blur = on
    ignore_alpha = 0.5
}

# Ventana de Notificaciones (Pop-ups)
layerrule {
    name = blur
    match:class = ^(swaync-notification-window)$
    blur = on
    ignore_alpha = 0.5
}

windowrule = match:class waybar-floating, float yes

workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1

workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
